version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: forrajeria-api:latest
    container_name: forrajeria_api
    ports:
      - "3000:3000"
    env_file:
      - ${ENV_FILE}
    depends_on:
      - db
    restart: unless-stopped
    command: sh /app/entrypoint.sh

  db:
    image: postgres:16
    container_name: forrajeria_db
    ports:
      - "5432:5432"
    env_file:
      - ${ENV_FILE}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
